<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Experiencia AR · Patrimonio Cultural</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #back {
      position: fixed; top: 12px; left: 12px; z-index: 999;
      background: rgba(0,0,0,0.6); color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 14px; font-size: 13px;
      font-family: Georgia, serif; text-decoration: none;
    }
  </style>
</head>
<body>
  <a href="index.html" id="back">← Volver</a>

  <a-scene embedded arjs vr-mode-ui="enabled: false">

    <a-assets timeout="10000">
      <img id="dimoni" src="DimoniBN.jpg">
      <audio id="dimoni-sound" src="dimoni_audio.mp3" preload="auto"></audio>
      <video id="correfoc-video"
        src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Correfocs_Girona_2015.ogv"
        autoplay loop crossorigin="anonymous" playsinline muted>
      </video>
    </a-assets>

    <a-marker preset="hiro">

      <!-- Imagen del Dimoni -->
      <a-image
        src="#dimoni"
        position="-0.9 1.2 0"
        width="1.2"
        height="1.6"
        rotation="-90 0 0">
      </a-image>

      <!-- Vídeo correfoc -->
      <a-video
        src="#correfoc-video"
        position="0.9 0.8 0"
        width="1.5"
        height="0.85"
        rotation="-90 0 0">
      </a-video>

      <!-- Texto -->
      <a-text
        value="El dimoni i la pedra\nPatrimoni Cultural"
        position="0 0.25 0"
        align="center"
        color="#c8a96e"
        scale="0.55 0.55 0.55">
      </a-text>

      <!-- Audio -->
      <a-sound src="#dimoni-sound" autoplay="true" loop="true" position="0 0 0"></a-sound>

    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
