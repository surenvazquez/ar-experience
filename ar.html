<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Experiencia AR · Patrimonio Cultural</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #back {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 14px;
      font-size: 13px;
      font-family: Georgia, serif;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <a href="index.html" id="back">← Volver</a>

  <a-scene embedded arjs vr-mode-ui="enabled: false">
    <a-marker preset="hiro">

      <a-text
        value="La realidad aumentada\ntransforma el patrimonio\nen experiencia"
        position="0 1.2 0"
        align="center"
        color="#c8a96e"
        scale="0.9 0.9 0.9"
        line-height="1.4">
      </a-text>

      <a-box
        position="0 0.2 0"
        scale="0.8 0.4 0.8"
        color="#1a1a2e"
        opacity="0.85">
      </a-box>

      <a-sphere
        position="0 0.7 0"
        radius="0.2"
        color="#c8a96e">
      </a-sphere>

    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
